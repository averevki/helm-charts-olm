tools:
  namespace: tools
  jaeger:
    enable: true
    image: quay.io/jaegertracing/jaeger
  mockserver:
    enable: true
    image: quay.io/rhn_support_azgabur/mockserver:latest
  keycloak:
    enable: true
    # 'operator' for RHBK operator
    # 'deployment' for Keycloak deployment
    keycloakProvider: "operator"
    operator:
      channel: stable-v26
      startingCSV: rhbk-operator.v26.0.10-opr.1  # Ignored if 'Automatic' bellow
      installPlanApproval: Automatic  # can be 'Automatic' or 'Manual'
    deployment:
      image: quay.io/keycloak/keycloak:26.6
    database:
      image: quay.io/sclorg/postgresql-16-c9s:latest
  redis:
    enable: true
    image: quay.io/opstree/redis:latest
  dragonfly:
    enable: true
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
  valkey:
    enable: true
    image: ghcr.io/valkey-io/valkey:latest
  vault:
    enable: true
  coredns:
    enable: false
    metrics: false
    zone: "k.example.com"
    image: quay.io/kuadrant/coredns-kuadrant:latest

vault:
  fullnameOverride: vault
  global:
    namespace: tools-vault
  injector:
    enabled: false
  server:
    image:
      repository: mirror.gcr.io/hashicorp/vault
    service:
      type: LoadBalancer
    postStart:
      - /bin/sh
      - -c
      - |
        for i in $(seq 1 30); do vault status 2>/dev/null && break || sleep 2; done
        vault auth enable kubernetes || true
        vault write auth/kubernetes/config kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443"
        echo 'path "secret/data/*" { capabilities = ["read"] }' | vault policy write kuadrant-policy -
        vault write auth/kubernetes/role/kuadrant-role bound_service_account_names='*' bound_service_account_namespaces='*' policies=kuadrant-policy
    dev:
      enabled: true
